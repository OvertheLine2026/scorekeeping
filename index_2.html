<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>OTL - Scorekeeping</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: #f5f5f0; min-height: 100vh; padding: 8px; }
  .app { max-width: 420px; margin: 0 auto; }

  .header { text-align: center; margin-bottom: 10px; padding-bottom: 8px; border-bottom: 1px solid #e0e0d8; }
  .header h1 { font-size: 16px; font-weight: 600; color: #1a1a1a; }

  .teams { display: grid; grid-template-columns: 1fr 1fr; gap: 6px; margin-bottom: 8px; }
  .team-input label { font-size: 10px; color: #888; text-transform: uppercase; letter-spacing: 0.05em; display: block; margin-bottom: 2px; }
  .team-input input { font-size: 13px; font-weight: 600; padding: 6px 8px; border: 1px solid #ddd; border-radius: 8px; background: white; color: #1a1a1a; width: 100%; -webkit-appearance: none; }

  .scoreboard { display: grid; grid-template-columns: 1fr auto 1fr; gap: 6px; margin-bottom: 8px; align-items: center; }
  .score-card { background: #eeeee8; border-radius: 8px; padding: 8px; text-align: center; border: 1px solid #ddd; }
  .score-card.active { border: 2.5px solid #1D9E75; background: #f0faf5; }
  .score-card .slabel { font-size: 10px; color: #666; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
  .score-card .runs { font-size: 36px; font-weight: 600; color: #1a1a1a; line-height: 1.1; }
  .score-card .badge { font-size: 9px; background: #1D9E75; color: white; padding: 1px 6px; border-radius: 20px; margin-top: 3px; display: inline-block; }

  .middle-col { display: flex; flex-direction: column; align-items: center; gap: 6px; }
  .outs-row { display: flex; align-items: center; gap: 5px; }
  .outs-label { font-size: 10px; color: #888; }
  .outs-dots { display: flex; gap: 4px; }
  .out-dot { width: 11px; height: 11px; border-radius: 50%; border: 1.5px solid #ccc; background: transparent; }
  .out-dot.filled { background: #D85A30; border-color: #D85A30; }

  .diamond { position: relative; width: 80px; height: 80px; }
  .base { position: absolute; width: 18px; height: 18px; border-radius: 2px; border: 1.5px solid #ccc; background: white; display: flex; align-items: center; justify-content: center; font-size: 8px; transition: background 0.15s; }
  .base.occupied { background: #1D9E75; border-color: #0F6E56; color: white; }
  #base-home { bottom: 0; left: 50%; transform: translateX(-50%) rotate(45deg); }
  #base-first { right: 0; top: 50%; transform: translateY(-50%) rotate(45deg); }
  #base-second { top: 0; left: 50%; transform: translateX(-50%) rotate(45deg); }
  #base-third { left: 0; top: 50%; transform: translateY(-50%) rotate(45deg); }

  .timer-row { display: flex; align-items: center; gap: 6px; background: white; border-radius: 8px; border: 1px solid #e0e0d8; padding: 6px 10px; margin-bottom: 8px; }
  .timer-display { font-size: 24px; font-weight: 600; color: #1a1a1a; flex: 1; text-align: center; font-variant-numeric: tabular-nums; }
  .timer-display.warning { color: #D85A30; }
  .tbtn { padding: 5px 10px; border-radius: 8px; border: 1px solid #ddd; background: white; cursor: pointer; font-size: 12px; font-weight: 500; color: #1a1a1a; -webkit-tap-highlight-color: transparent; }
  .tbtn:active { background: #eee; }

  .section-label { font-size: 10px; color: #888; text-transform: uppercase; letter-spacing: 0.05em; margin-bottom: 6px; }

  .hit-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 6px; margin-bottom: 6px; }
  .hit-btn { padding: 14px 6px; border-radius: 8px; border: 1px solid #ddd; cursor: pointer; text-align: center; -webkit-tap-highlight-color: transparent; transition: transform 0.1s; }
  .hit-btn:active { transform: scale(0.94); }
  .hit-btn .hlabel { font-size: 14px; font-weight: 600; color: #1a1a1a; }
  .hit-btn .hsub { font-size: 10px; color: #666; margin-top: 2px; }
  .btn-single { background: #EAF3DE; border-color: #639922; }
  .btn-double { background: #FAEEDA; border-color: #BA7517; }
  .btn-triple { background: #E6F1FB; border-color: #185FA5; }
  .btn-hr     { background: #FCEBEB; border-color: #A32D2D; }

  .out-row { display: grid; grid-template-columns: 1fr 1fr; gap: 6px; margin-bottom: 10px; }
  .out-btn { padding: 12px 6px; border-radius: 8px; border: 1px solid #A32D2D; background: #FCEBEB; cursor: pointer; text-align: center; font-size: 13px; font-weight: 600; color: #A32D2D; -webkit-tap-highlight-color: transparent; }
  .out-btn:active { transform: scale(0.94); }
  .undo-btn { border-color: #ccc; background: #eeeee8; color: #666; }

  .log { max-height: 100px; overflow-y: auto; border: 1px solid #e0e0d8; border-radius: 8px; padding: 6px 8px; margin-bottom: 10px; background: white; }
  .log-entry { font-size: 11px; color: #666; padding: 2px 0; border-bottom: 1px solid #f0f0ea; display: flex; justify-content: space-between; gap: 8px; }
  .log-entry:last-child { border-bottom: none; }
  .log-empty { font-size: 11px; color: #aaa; text-align: center; padding: 6px 0; }

  .final-banner { border-radius: 12px; padding: 16px; text-align: center; margin-bottom: 10px; display: none; background: #1D9E75; }
  .final-banner.tie { background: #888; }
  .final-banner .wtitle { font-size: 20px; font-weight: 700; color: white; }
  .final-banner .wscore { font-size: 13px; color: rgba(255,255,255,0.85); margin-top: 4px; }

  .reset-btn { width: 100%; padding: 10px; border-radius: 8px; border: 1px solid #ddd; background: white; cursor: pointer; font-size: 12px; color: #888; -webkit-tap-highlight-color: transparent; }
  .reset-btn:active { background: #eee; }
</style>
</head>
<body>
<div class="app">
  <div class="header"><h1>OTL - Scorekeeping</h1></div>

  <div class="teams">
    <div class="team-input"><label>Home</label><input id="t1" value="Team A" oninput="renderAll()"></div>
    <div class="team-input"><label>Away</label><input id="t2" value="Team B" oninput="renderAll()"></div>
  </div>

  <div class="scoreboard">
    <div class="score-card" id="card1">
      <div class="slabel" id="slabel1">Team A</div>
      <div class="runs" id="sc1">0</div>
    </div>
    <div class="middle-col">
      <div class="outs-row">
        <span class="outs-label">outs</span>
        <div class="outs-dots">
          <div class="out-dot" id="d0"></div>
          <div class="out-dot" id="d1"></div>
          <div class="out-dot" id="d2"></div>
        </div>
      </div>
      <div class="diamond">
        <div class="base" id="base-second"><span id="b2t"></span></div>
        <div class="base" id="base-third"><span id="b3t"></span></div>
        <div class="base" id="base-first"><span id="b1t"></span></div>
        <div class="base" id="base-home"></div>
      </div>
    </div>
    <div class="score-card" id="card2">
      <div class="slabel" id="slabel2">Team B</div>
      <div class="runs" id="sc2">0</div>
    </div>
  </div>

  <div class="timer-row">
    <button class="tbtn" id="tbtn" onclick="toggleTimer()">Start</button>
    <div class="timer-display" id="timer-display">12:00</div>
    <button class="tbtn" onclick="resetTimer()">Reset</button>
  </div>

  <div class="section-label">Record a hit</div>
  <div class="hit-grid">
    <button class="hit-btn btn-single" onclick="recordHit(1)"><div class="hlabel">Single</div><div class="hsub">1 base</div></button>
    <button class="hit-btn btn-double" onclick="recordHit(2)"><div class="hlabel">Double</div><div class="hsub">2 bases</div></button>
    <button class="hit-btn btn-triple" onclick="recordHit(3)"><div class="hlabel">Triple</div><div class="hsub">3 bases</div></button>
    <button class="hit-btn btn-hr" onclick="recordHit(4)"><div class="hlabel">Home Run</div><div class="hsub">clear bases</div></button>
  </div>

  <div class="section-label">Record an out</div>
  <div class="out-row">
    <button class="out-btn" onclick="recordOut()">Out (fly / clean field)</button>
    <button class="out-btn undo-btn" onclick="undoLast()">↩ Undo last</button>
  </div>

  <div class="section-label">Play log</div>
  <div class="log" id="log"><div class="log-empty">No plays yet</div></div>

  <div class="final-banner" id="final-banner">
    <div class="wtitle" id="wtitle"></div>
    <div class="wscore" id="wscore"></div>
  </div>

  <button class="reset-btn" onclick="resetGame()">Reset game</button>
</div>

<script>
var G={scores:[0,0],bases:[false,false,false],outs:0,batting:0,half:1,log:[],done:false,history:[]};
var timerInterval=null,timerSeconds=720,timerRunning=false;

function tname(i){return(document.getElementById(i===0?'t1':'t2').value.trim()||(i===0?'Team A':'Team B'));}
function saveHistory(){G.history.push(JSON.stringify({scores:G.scores.slice(),bases:G.bases.slice(),outs:G.outs,batting:G.batting,half:G.half,log:G.log.slice(),done:G.done}));if(G.history.length>30)G.history.shift();}

function recordHit(bases){
  if(G.done)return;
  saveHistory();
  var runs=0,newBases=[false,false,false];
  for(var i=2;i>=0;i--){if(G.bases[i]){var dest=i+bases;if(dest>=3)runs++;else newBases[dest]=true;}}
  var bd=bases-1;if(bd>=3)runs++;else newBases[bd]=true;
  G.bases=newBases;G.scores[G.batting]+=runs;
  var names=['single','double','triple','home run'];
  addLog(tname(G.batting)+': '+names[bases-1]+(runs>0?' · '+runs+' run'+(runs>1?'s':''):''));
  renderAll();
}

function recordOut(){
  if(G.done)return;
  saveHistory();
  G.outs++;
  addLog(tname(G.batting)+': out ('+G.outs+'/3)');
  if(G.outs>=3){
    G.bases=[false,false,false];G.outs=0;
    if(G.batting===0){G.batting=1;addLog('--- '+tname(1)+' now batting ---');}
    else{if(G.half>=2){G.done=true;addLog('=== Game over ===');}else{G.half++;G.batting=0;addLog('--- Half 2 · '+tname(0)+' batting ---');}}
  }
  renderAll();
}

function undoLast(){if(G.history.length===0)return;var p=JSON.parse(G.history.pop());G.scores=p.scores;G.bases=p.bases;G.outs=p.outs;G.batting=p.batting;G.half=p.half;G.log=p.log;G.done=p.done;renderAll();}
function addLog(txt){var now=new Date();G.log.push({text:txt,time:now.getHours()+':'+String(now.getMinutes()).padStart(2,'0')});}

function renderAll(){
  document.getElementById('sc1').textContent=G.scores[0];
  document.getElementById('sc2').textContent=G.scores[1];
  document.getElementById('slabel1').textContent=tname(0);
  document.getElementById('slabel2').textContent=tname(1);
  var c1=document.getElementById('card1'),c2=document.getElementById('card2');
  c1.className='score-card'+(G.batting===0?' active':'');
  c2.className='score-card'+(G.batting===1?' active':'');
  c1.querySelectorAll('.badge').forEach(function(b){b.remove();});
  c2.querySelectorAll('.badge').forEach(function(b){b.remove();});
  var ab=document.createElement('div');ab.className='badge';ab.textContent='batting';
  document.getElementById(G.batting===0?'card1':'card2').appendChild(ab);
  for(var i=0;i<3;i++)document.getElementById('d'+i).className='out-dot'+(i<G.outs?' filled':'');
  var be=[document.getElementById('base-first'),document.getElementById('base-second'),document.getElementById('base-third')];
  for(var j=0;j<3;j++){if(G.bases[j]){be[j].className='base occupied';be[j].querySelector('span').textContent='●';}else{be[j].className='base';be[j].querySelector('span').textContent='';}}
  var logEl=document.getElementById('log');
  if(G.log.length===0){logEl.innerHTML='<div class="log-empty">No plays yet</div>';}
  else{logEl.innerHTML=G.log.slice().reverse().map(function(e){return'<div class="log-entry"><span>'+e.text+'</span><span>'+e.time+'</span></div>';}).join('');}
  var banner=document.getElementById('final-banner');
  if(G.done){banner.style.display='block';var s0=G.scores[0],s1=G.scores[1];if(s0===s1){banner.className='final-banner tie';document.getElementById('wtitle').textContent='Tie game!';}else{banner.className='final-banner';document.getElementById('wtitle').textContent=(s0>s1?tname(0):tname(1))+' wins!';}document.getElementById('wscore').textContent=tname(0)+' '+s0+' – '+s1+' '+tname(1);}else{banner.style.display='none';}
}

function toggleTimer(){
  if(timerRunning){clearInterval(timerInterval);timerRunning=false;document.getElementById('tbtn').textContent='Resume';}
  else{if(timerSeconds<=0)return;timerRunning=true;document.getElementById('tbtn').textContent='Pause';timerInterval=setInterval(function(){timerSeconds--;updateTimerDisplay();if(timerSeconds<=0){clearInterval(timerInterval);timerRunning=false;document.getElementById('tbtn').textContent='Start';addLog('=== Horn: time! ===');renderAll();}},1000);}
}
function resetTimer(){clearInterval(timerInterval);timerRunning=false;timerSeconds=720;document.getElementById('tbtn').textContent='Start';updateTimerDisplay();}
function updateTimerDisplay(){var m=Math.floor(timerSeconds/60),s=timerSeconds%60;var el=document.getElementById('timer-display');el.textContent=m+':'+String(s).padStart(2,'0');el.className='timer-display'+(timerSeconds<=60?' warning':'');}
function resetGame(){if(!confirm('Reset game? All scores cleared.'))return;clearInterval(timerInterval);timerRunning=false;timerSeconds=720;document.getElementById('tbtn').textContent='Start';updateTimerDisplay();G={scores:[0,0],bases:[false,false,false],outs:0,batting:0,half:1,log:[],done:false,history:[]};renderAll();}

renderAll();
</script>
</body>
</html>
